<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shadow Network Client - Play Minecraft 1.12 in your browser">
    <meta name="keywords" content="eaglercraft, minecraft, 1.12, 1.12.2, shadow network">
    <title>Shadow Network Client</title>
    <link type="image/png" rel="shortcut icon" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Intro Animation Section */
        .intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .intro.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .intro-content {
            text-align: center;
        }

        .intro-logo {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards;
        }

        .intro-subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-top: 1rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease 0.3s forwards;
        }

        .intro-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, #fff, transparent);
            margin: 2rem auto;
            opacity: 0;
            animation: fadeIn 1s ease 0.6s forwards;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            animation: fadeIn 1s ease 1s forwards, bounce 2s ease-in-out infinite 1.5s;
        }

        .scroll-indicator span {
            display: block;
            width: 24px;
            height: 40px;
            border: 2px solid #666;
            border-radius: 12px;
            position: relative;
        }

        .scroll-indicator span::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 8px;
            background: #fff;
            border-radius: 2px;
            animation: scroll 2s ease-in-out infinite;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-10px);
            }
            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }

        @keyframes scroll {
            0% {
                opacity: 1;
                top: 8px;
            }
            100% {
                opacity: 0;
                top: 24px;
            }
        }

        /* Main Content */
        .main-content {
            min-height: 100vh;
            padding: 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease;
        }

        .main-content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .main-title {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            text-align: center;
            margin-bottom: 1rem;
        }

        .main-subtitle {
            font-size: 1.2rem;
            color: #888;
            text-align: center;
            margin-bottom: 4rem;
            max-width: 600px;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 800px;
            width: 100%;
        }

        .button-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px 30px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .button-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .button-card:hover {
            border-color: #666;
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .button-card:hover::before {
            opacity: 1;
        }

        .button-card h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .button-card p {
            color: #666;
            font-size: 0.9rem;
        }

        .button-card .arrow {
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .button-card:hover .arrow {
            opacity: 1;
            transform: translateX(0);
        }

        footer {
            margin-top: 4rem;
            color: #444;
            font-size: 0.9rem;
        }

        footer a {
            color: #666;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #fff;
        }

        @media (max-width: 768px) {
            .intro-logo {
                font-size: 2.5rem;
            }

            .main-title {
                font-size: 2rem;
            }

            .buttons-grid {
                grid-template-columns: 1fr;
            }

            .button-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="intro" id="intro">
        <div class="intro-content">
            <h1 class="intro-logo">Shadow Network</h1>
            <p class="intro-subtitle">Play Minecraft 1.12.2 in your browser</p>
            <div class="intro-line"></div>
        </div>
        <div class="scroll-indicator">
            <span></span>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <h1 class="main-title">Choose Your Client</h1>
        <p class="main-subtitle">Select a version to start playing</p>

        <div class="buttons-grid">
            <a href="ShadowNetClient_1.12_Offline_International.html" class="button-card">
                <h3>ShadowNet JS</h3>
                <p>JavaScript-based offline client</p>
                <span class="arrow">→</span>
            </a>

            <a href="ShadowNetClient_1.12.2_WASM_Offline_Download.html" class="button-card">
                <h3>ShadowNet WASM</h3>
                <p>WebAssembly-powered client</p>
                <span class="arrow">→</span>
            </a>

            <a href="shadowjs/" class="button-card">
                <h3>Shadow JS</h3>
                <p>JavaScript online version</p>
                <span class="arrow">→</span>
            </a>

            <a href="shadowwasm/" class="button-card">
                <h3>Shadow WASM</h3>
                <p>WebAssembly online version</p>
                <span class="arrow">→</span>
            </a>
        </div>

        <footer>
            <a href="https://github.com/pxdns/shadownnet" target="_blank">GitHub</a>
        </footer>
    </div>

    <script>
        // Auto-scroll after intro animation
        setTimeout(() => {
            const intro = document.getElementById('intro');
            const mainContent = document.getElementById('mainContent');
            
            intro.classList.add('hidden');
            
            setTimeout(() => {
                mainContent.classList.add('visible');
            }, 300);
        }, 3000);

        // Allow manual scroll to skip intro
        window.addEventListener('scroll', () => {
            const intro = document.getElementById('intro');
            const mainContent = document.getElementById('mainContent');
            
            if (window.scrollY > 50) {
                intro.classList.add('hidden');
                setTimeout(() => {
                    mainContent.classList.add('visible');
                }, 300);
            }
        });

        // Click to skip intro
        document.getElementById('intro').addEventListener('click', () => {
            const intro = document.getElementById('intro');
            const mainContent = document.getElementById('mainContent');
            
            intro.classList.add('hidden');
            setTimeout(() => {
                mainContent.classList.add('visible');
            }, 300);
        });
    </script>
</body>
</html>
